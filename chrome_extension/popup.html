<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: system-ui; margin: 0; padding: 12px; background: #111; color: #eee; }
    h2 { margin: 0 0 8px; font-size: 16px; color: #4af; }
    .stat { padding: 6px 10px; margin: 3px 0; background: #1a1a1a; border-radius: 4px; display: flex; justify-content: space-between; }
    .stat .v { font-weight: bold; }
    .red { color: #f44; } .green { color: #4f4; } .yellow { color: #fa0; }
    .btn { width: 100%; padding: 8px; margin: 4px 0; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
    .pause { background: #fa0; color: #000; }
    .resume { background: #4a4; color: #fff; }
    .flatten { background: #d22; color: #fff; }
    .kill { background: #722; color: #faa; font-size: 11px; }
    .refresh { background: #36a; color: #fff; }
    #status { font-size: 11px; color: #888; margin-top: 6px; text-align: center; }
    select, input { width: 100%; padding: 6px; margin: 3px 0; background: #222; color: #eee; border: 1px solid #444; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>🦉 Hermes Bot</h2>
  <div id="stats">
    <div class="stat"><span>Equity</span><span class="v" id="equity">...</span></div>
    <div class="stat"><span>Today P&L</span><span class="v" id="pnl">...</span></div>
    <div class="stat"><span>Open Trades</span><span class="v" id="open">...</span></div>
    <div class="stat"><span>Regime</span><span class="v" id="regime">...</span></div>
    <div class="stat"><span>Keys Live</span><span class="v" id="keys">...</span></div>
  </div>

  <div style="margin-top:10px">
    <button class="btn refresh" id="refresh">🔄 Refresh</button>
    <button class="btn pause" id="pause">⏸️ Pause</button>
    <button class="btn resume" id="resume">▶️ Resume</button>
    <button class="btn flatten" id="flatten">🚨 Flatten All</button>
  </div>

  <div style="margin-top:8px">
    <select id="agentSelect"></select>
    <button class="btn kill" id="killAgent">🔴 Kill Agent</button>
  </div>

  <div id="status">Loading...</div>
  <script src="popup.js"></script>
</body>
</html>
